name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v2
      - name: Debug gradle files
        run: |
          echo "=== android/app/build.gradle ==="
          head -30 android/app/build.gradle
          echo ""
          echo "=== android/build.gradle ==="
          cat android/build.gradle
          echo ""
          echo "=== android/gradle.properties ==="
          cat android/gradle.properties
          echo ""
          echo "=== assets dir ==="
          ls android/app/src/main/assets/ 2>/dev/null || echo "NO_ASSETS_DIR"
      - run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle_output.txt
          echo "GRADLE_EXIT=$?" >> $GITHUB_OUTPUT
      - run: |
          echo "=== GRADLE OUTPUT TAIL ==="
          tail -100 /tmp/gradle_output.txt
          echo "=== APK EXISTS? ==="
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "NO_APK_DIR"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
