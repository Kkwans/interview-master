name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v2
      - name: Clean and verify
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean --no-daemon 2>&1 | tail -5
          echo "CLEAN_DONE"
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle_output.txt
          echo "GRADLE_EXIT=$?" >> $GITHUB_OUTPUT
      - name: Check APK
        if: always()
        run: |
          echo "=== GRADLE EXIT STATUS ==="
          grep "GRADLE_EXIT" /tmp/gradle_output.txt || echo "NO_GRADLE_EXIT"
          echo ""
          echo "=== APK CHECK ==="
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "NO_APK_DIR"
          echo ""
          echo "=== BUILD ERRORS (if any) ==="
          grep -E "FAILURE|ERROR|Could not|Unresolved|What went wrong" /tmp/gradle_output.txt | grep -v "warning:" | tail -20
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: interview-master-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
